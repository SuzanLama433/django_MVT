<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prabhu Bank ATM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="container py-5">

        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">

                <div class="atm-card shadow-lg">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-white">🏦 Prabhu Bank ATM</h2>
                        <p class="text-light mb-0">Secure Banking Services</p>
                    </div>

                    <form method="post" action="{% url 'atm' %}" >
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label text-white">
                                Enter PIN
                            </label>
                            <input type="password"
                            name="pin"
                                class="form-control form-control-lg"
                                id="pin"
                                maxlength="4"
                                placeholder="****"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white">
                                Select Transaction
                            </label>

                            <select name="option" class="form-select form-select-lg" id="transaction">
                                <option value="balance">💰 Check Balance</option>
                                <option value="withdraw">💸 Withdraw Cash</option>
                                <option value="deposit">🏦 Deposit Cash</option>
                            </select>
                        </div>

                        <div class="mb-4" id="amountField">
                            <label class="form-label text-white">
                                Enter Amount (Rs.)
                            </label>

                            <input type="number"
                                class="form-control form-control-lg"
                                id="amount"
                                name="amount"
                                placeholder="Enter Amount">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold">
                                Submit
                            </button>

                            <button type="reset"
                                class="btn btn-outline-light btn-lg"
                                onclick="resetForm()">
                                Clear
                            </button>
                        </div>

                    </form>

                </div>

                <div class="result-box mt-4">
                    <h4 id="result" class="text-center"> {{result}}</h4>
                </div>

            </div>
        </div>

    </div>

    <script src="atm.js"></script>

</body>

</html>
