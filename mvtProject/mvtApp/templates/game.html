<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Play Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        input {
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <form method="POST" action="{% url 'game' %}">
        {% csrf_token %}

        <div class="game-box shadow">

            <h2>🎮 Play Game</h2>
            <p>Enter S, P or R</p>

            <!-- INPUT -->
            <input type="text"
                   name="words"
                   class="form-control text-center"
                   placeholder="S / P / R"
                   maxlength="1"
                   required>

            <!-- BUTTON (FIXED) -->
            <button type="submit" class="btn btn-success mt-3 w-100">
                Play
            </button>

            <!-- OUTPUT -->
            <div class="result">

                {% if result %}
                    <p>Your Choice: {{ user }}</p>
                    <p>Computer Choice: {{ computer }}</p>
                    <h3>{{ result }}</h3>
                {% endif %}

            </div>

            <!-- BACK BUTTON -->
            <a href="{% url 'index' %}" class="btn btn-secondary mt-3 w-100">
                ⬅ Back
            </a>

        </div>
    </form>

</body>

</html>
