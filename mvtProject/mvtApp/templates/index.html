<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <!-- bootstrap cdn link -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card shadow-lg">
    <h1>✊ Rock Paper Scissors ✋</h1>
    <p class="mt-3">Beat the computer and test your luck 🎮</p>

    <a href="{% url 'game' %}" class="btn btn-warning btn-lg mt-3">
      ▶ Play Game
    </a>
  </div>

</body>
</html>
