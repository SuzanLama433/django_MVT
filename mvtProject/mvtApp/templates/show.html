    <body>
        <!-- navbar section start -->

                    <span class="navbar-toggler-icon"></span>
                </button>

                    <ul class="navbar-nav mx-auto gap-4 mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Show</a>
                        </li>
                            <li class="nav-item">
                            <a class="nav-link active" href="{% url 'count' %}">Count</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">

                    <form method="get" action="{% url 'show' %}" class="d-flex" role="search">
                        <input class="form-control me-2" name="searched" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
        <!-- navbar section end -->

        <section>
            <div class="container">
                <div class="row">
                    <div class="col-10 mx-auto my-3 alert alert-info">
                        <h1>hello sujan</h1>
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Name</th>
                                    <th scope="col">Age</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">message</th>
                                    <th scope="col">DOB</th>



                                </tr>
                            </thead>
                            <tbody>
                                
                                {% for i in sujan  %}
                                <tr>
                                    <th scope="row">{{i.id}}</th>
                                    <td>{{i.name}}</td>
                                    <td>{{i.age}}</td>
                                    <td>{{i.email}}</td>
                                    <td>{{i.message}}</td>
                                    <td>{{i.dob}}</td>
                                </tr>
                                {% empty %}
                                <p class="alert alert-danger text-center">NO Items</p>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <form method="get" action="{% url 'show' %}">
            <label for="">Start Dob</label>
            <input name="sdob" type="date">
            <label for="">End Date</label>
            <input name="ldob" type="date">

            <input type="submit" value="search">
        </form>



        <!-- bootstrap js dcn link -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
